<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CustomQuiz — Loader (pensel + ord)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F5F0E6;
    --bg-soft:#FBF7EE;
    --ink:#1F1A14;
    --ink-mute:#7A6F5A;
    --rule:#E2D8C2;
    --accent:#0A6E5A;
    --accent-soft:#C9E2D8;
    --accent-deep:#074538;
    /* aktiv spot-farge — settes per kategori */
    --spot:var(--accent);
  }

  *{box-sizing:border-box;margin:0;padding:0}

  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Manrope',system-ui,sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    overflow:hidden;
  }

  /* subtil prikketekstur */
  body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:radial-gradient(var(--rule) 0.5px, transparent 0.5px);
    background-size:4px 4px;
    opacity:.55;
    pointer-events:none;
  }

  .loader{
    width:min(560px,90vw);
    text-align:center;
    position:relative;
    z-index:1;
  }

  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:.2em;
    text-transform:uppercase;
    color:var(--spot);
    margin-bottom:28px;
  }

  /* ---- Penselstrøk-progresjon ---- */
  .brush-wrap{
    position:relative;
    width:100%;
    height:46px;
    margin:0 auto 40px;
  }
  .brush-svg{width:100%;height:100%;overflow:visible}
  /* spor: blekt strøk i bakgrunnen */
  .brush-track{
    fill:none;
    stroke:var(--rule);
    stroke-width:13;
    stroke-linecap:round;
  }
  /* selve strøket som males inn */
  .brush-fill{
    fill:none;
    stroke:var(--spot);
    stroke-width:14;
    stroke-linecap:round;
    filter:url(#rough);
    stroke-dasharray:var(--len);
    stroke-dashoffset:var(--len);
    transition:stroke-dashoffset .35s cubic-bezier(.4,0,.2,1);
  }

  /* ---- Statuslinje: ord males ett og ett ---- */
  .status{
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--ink-mute);
    min-height:1.4em;
    display:flex;
    justify-content:center;
    gap:.5em;
    flex-wrap:wrap;
  }
  .status .word{
    position:relative;
    color:var(--ink);
    opacity:.35;
    transition:opacity .25s ease;
    padding-bottom:3px;
  }
  .status .word.lit{opacity:1}
  /* teal understrøk som "males" inn under hvert ord */
  .status .word::after{
    content:"";
    position:absolute;
    left:0;bottom:0;
    height:2px;
    width:100%;
    background:var(--spot);
    transform:scaleX(0);
    transform-origin:left;
    transition:transform .3s cubic-bezier(.4,0,.2,1);
  }
  .status .word.lit::after{transform:scaleX(1)}

  .hint{
    margin-top:54px;
    font-size:13px;
    color:var(--ink-mute);
  }
  .hint em{font-family:'Fraunces',serif;font-style:italic;color:var(--ink)}

  /* kategori-velger (kun for demo) */
  .demo-bar{
    position:fixed;
    bottom:18px;left:50%;
    transform:translateX(-50%);
    display:flex;gap:8px;
    z-index:2;
    background:var(--bg-soft);
    border:.5px solid var(--rule);
    border-radius:999px;
    padding:7px 10px;
  }
  .demo-bar button{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;letter-spacing:.1em;text-transform:uppercase;
    border:.5px solid var(--rule);
    background:transparent;color:var(--ink-mute);
    border-radius:999px;padding:6px 11px;cursor:pointer;
    transition:all .2s;
  }
  .demo-bar button:hover{border-color:var(--spot);color:var(--ink)}
</style>
</head>
<body>

  <div class="loader" id="loader">
    <div class="eyebrow" id="eyebrow">Genererer quiz</div>

    <div class="brush-wrap">
      <svg class="brush-svg" viewBox="0 0 520 46" preserveAspectRatio="none">
        <defs>
          <!-- gir penselen en litt ujevn, malt kant -->
          <filter id="rough">
            <feTurbulence type="fractalNoise" baseFrequency="0.012 0.18" numOctaves="2" seed="7" result="n"/>
            <feDisplacementMap in="SourceGraphic" in2="n" scale="6"/>
          </filter>
        </defs>
        <path class="brush-track" d="M14,26 C120,8 260,40 380,20 C440,11 480,24 506,21"/>
        <path class="brush-fill" id="brush" d="M14,26 C120,8 260,40 380,20 C440,11 480,24 506,21"/>
      </svg>
    </div>

    <div class="status" id="status"></div>

    <p class="hint">Lager en quiz om <em id="topic">geografi</em> …</p>
  </div>

  <div class="demo-bar" id="demoBar"></div>

<script>
  const SPOTS = {
    'Mix':        {c:'#0A6E5A', topic:'litt av hvert'},
    'Geografi':   {c:'#5C7A3C', topic:'geografi'},
    'Teknologi':  {c:'#2C4A8F', topic:'teknologi'},
    'Historie':   {c:'#B05238', topic:'verdenshistorie'},
    'Filosofi':   {c:'#6B3050', topic:'filosofi'},
    'Musikk':     {c:'#C68A2E', topic:'musikk'},
  };

  // stegene som "males" inn ett ord av gangen
  const STEPS = [
    'LESER',        // varmer opp
    'FORMULERER',   // spørsmål
    'VELGER',       // distraktorer
    'KVALITETSSIKRER',
    'KLAR'
  ];

  const brush  = document.getElementById('brush');
  const status = document.getElementById('status');
  const eyebrow= document.getElementById('eyebrow');
  const topicEl= document.getElementById('topic');
  let timers = [];

  // sett strøk-lengde dynamisk så dash-animasjonen blir presis
  function initBrush(){
    const len = brush.getTotalLength();
    brush.style.setProperty('--len', len);
    document.querySelectorAll('.brush-track,.brush-fill').forEach(p=>{});
  }

  function setSpot(name){
    const s = SPOTS[name];
    document.documentElement.style.setProperty('--spot', s.c);
    topicEl.textContent = s.topic;
  }

  function clearTimers(){timers.forEach(t=>clearTimeout(t));timers=[]}

  function run(){
    clearTimers();
    // bygg ord
    status.innerHTML = STEPS.map(w=>`<span class="word">${w}</span>`).join('');
    const words = [...status.querySelectorAll('.word')];
    const len = brush.getTotalLength();
    brush.style.transition='none';
    brush.style.strokeDashoffset = len;

    // tving reflow så reset gjelder
    void brush.getBoundingClientRect();
    brush.style.transition='';

    const stepDur = 620; // ms per steg
    words.forEach((w,i)=>{
      timers.push(setTimeout(()=>{
        // tenn ordet + understrøk
        words.forEach(x=>x.classList.remove('lit'));
        w.classList.add('lit');
        // mal penselen videre
        const progress = (i+1)/words.length;
        brush.style.strokeDashoffset = len*(1-progress);
      }, i*stepDur));
    });

    // loop på slutten
    timers.push(setTimeout(run, words.length*stepDur + 700));
  }

  // demo-knapper
  const bar = document.getElementById('demoBar');
  Object.keys(SPOTS).forEach(name=>{
    const b=document.createElement('button');
    b.textContent=name;
    b.onclick=()=>{setSpot(name); run();};
    bar.appendChild(b);
  });

  // start
  window.addEventListener('load',()=>{
    initBrush();
    setSpot('Geografi');
    run();
  });
</script>
</body>
</html>
