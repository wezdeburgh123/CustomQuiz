<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<meta name="theme-color" content="#F5F0E6">
<title>Min side — CustomQuiz</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/jpeg" href="IMG/signature.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=JetBrains+Mono:wght@400;500;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#F5F0E6; --bg-soft:#FBF7EE; --bg-deep:#ECE3CE;
    --ink:#1F1A14; --ink-soft:#4B4338; --ink-mute:#7A6F5A;
    --rule:#E2D8C2; --rule-strong:#C9BD9F;
    --accent:#0A6E5A; --accent-soft:#C9E2D8; --accent-deep:#074538;
    --r-pill:999px; --r-card:16px; --r-md:8px;
    --font-display:'Fraunces',Georgia,serif; --font-sans:'Manrope',system-ui,sans-serif; --font-mono:'JetBrains Mono',ui-monospace,monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--ink); font-family:var(--font-sans); line-height:1.6; -webkit-font-smoothing:antialiased; }
  .container { max-width:760px; margin:0 auto; padding:28px 24px 80px; }
  .masthead { display:flex; align-items:center; justify-content:space-between; padding-bottom:24px; border-bottom:1px solid var(--rule); margin-bottom:48px; }
  .masthead-logo { display:flex; align-items:center; gap:10px; text-decoration:none; color:var(--ink); }
  .masthead-mark { width:30px; height:30px; border-radius:6px; object-fit:cover; }
  .masthead-wordmark { font-family:var(--font-display); font-size:20px; font-weight:500; }
  .masthead-meta { font-family:var(--font-mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-mute); display:flex; align-items:center; gap:8px; }
  .masthead-link { color:var(--accent); text-decoration:none; }
  .masthead-link:hover { color:var(--accent-deep); }
  .eyebrow { font-family:var(--font-mono); font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--accent); margin-bottom:14px; }
  h1 { font-family:var(--font-display); font-size:40px; font-weight:500; line-height:1.1; margin-bottom:10px; }
  h1 em { font-style:italic; color:var(--accent); }
  .lede { font-family:var(--font-display); font-size:18px; color:var(--ink-soft); margin-bottom:36px; }
  .card { background:var(--bg-soft); border:.5px solid var(--rule-strong); border-radius:var(--r-card); padding:28px 26px; margin-bottom:18px; }
  .card .label { font-family:var(--font-mono); font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-mute); margin-bottom:6px; }
  .card .value { font-family:var(--font-display); font-size:22px; color:var(--ink); }
  .status-row { display:flex; align-items:center; gap:10px; }
  .badge { display:inline-flex; align-items:center; gap:7px; padding:5px 13px; border-radius:var(--r-pill); font-family:var(--font-mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; }
  .badge.active { background:var(--accent-soft); color:var(--accent-deep); }
  .badge.none { background:var(--bg-deep); color:var(--ink-mute); }
  .badge.pending { background:#F3E6C8; color:#8A6418; }
  .dot { width:7px; height:7px; border-radius:50%; background:currentColor; }
  .btn { display:inline-flex; align-items:center; gap:10px; padding:15px 26px; background:var(--accent); color:var(--bg-soft); border:1px solid var(--accent); border-radius:var(--r-pill); font-family:var(--font-sans); font-size:14px; font-weight:500; letter-spacing:.03em; cursor:pointer; text-decoration:none; }
  .btn:hover { background:var(--accent-deep); border-color:var(--accent-deep); }
  .btn-ghost { background:none; color:var(--accent); }
  .btn-ghost:hover { background:none; color:var(--accent-deep); }
  .btn-arrow { font-family:var(--font-display); font-size:17px; }
  .actions { display:flex; gap:14px; flex-wrap:wrap; align-items:center; margin-top:26px; }
  .muted { color:var(--ink-mute); font-size:13px; }
  footer { border-top:1px solid var(--rule-strong); padding-top:28px; margin-top:56px; font-family:var(--font-mono); font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--ink-mute); display:flex; justify-content:space-between; }
  footer .brand { color:var(--accent); font-family:var(--font-display); font-style:italic; text-transform:none; letter-spacing:0; font-size:17px; }
  .hidden { display:none !important; }
  @media (max-width:600px){ h1{font-size:32px;} }
</style>
</head>
<body>

<div class="container">
  <header class="masthead">
    <a class="masthead-logo" href="index.html" aria-label="CustomQuiz hjem">
      <img class="masthead-mark" src="IMG/logo-variant.jpg" alt="">
      <span class="masthead-wordmark">CustomQuiz</span>
    </a>
    <nav class="masthead-meta">
      <a href="arkiv.html" class="masthead-link">Arkivet</a>
    </nav>
  </header>

  <div class="eyebrow">Min side</div>
  <h1>Kontoen <em>din</em>.</h1>

  <!-- Utlogget -->
  <div id="view-guest" class="hidden">
    <p class="lede">Logg inn med e-post for å se abonnementet ditt, streaken og dine egne quizer.</p>
    <button class="btn" type="button" id="login-btn">Logg inn <span class="btn-arrow">→</span></button>
  </div>

  <!-- Innlogget -->
  <div id="view-user" class="hidden">
    <div class="card">
      <div class="label">Innlogget som</div>
      <div class="value" id="user-email">—</div>
    </div>
    <div class="card">
      <div class="label">Abonnement</div>
      <div class="status-row">
        <span class="badge none" id="sub-badge"><span class="dot"></span><span id="sub-text">Sjekker …</span></span>
      </div>
      <div class="actions" id="sub-actions"></div>
    </div>
    <div class="actions">
      <button class="btn btn-ghost" type="button" id="logout-btn">Logg ut</button>
    </div>
  </div>

  <!-- Ikke konfigurert -->
  <div id="view-unconfigured" class="hidden">
    <p class="lede">Innlogging er ikke koblet på ennå. Fyll inn Supabase-nøklene i <code>supabase-config.js</code>.</p>
  </div>

  <footer>
    <div><span class="brand">CustomQuiz</span> · customquiz.no</div>
    <div>© 2026</div>
  </footer>
</div>

<script src="supabase-config.js"></script>
<script src="auth.js"></script>
<script>
  const $ = (id) => document.getElementById(id);
  function show(view) {
    ["view-guest","view-user","view-unconfigured"].forEach(v => $(v).classList.toggle("hidden", v !== view));
  }

  async function renderSub(email) {
    const badge = $("sub-badge"), text = $("sub-text"), actions = $("sub-actions");
    try {
      const r = await fetch("/api/subscription-status?email=" + encodeURIComponent(email));
      const d = await r.json();
      const st = d.status || "none";
      badge.className = "badge " + (st === "active" ? "active" : st === "pending" ? "pending" : "none");
      text.textContent = st === "active" ? "Aktiv · Premium" : st === "pending" ? "Venter på betaling" : "Ingen — gratisbruker";
      actions.innerHTML = (st === "active")
        ? '<span class="muted">Kilde: ' + (d.source || "—") + '. Si opp? Svar på kvitterings-e-posten så ordner vi det (selvbetjening kommer).</span>'
        : '<a class="btn" href="arkiv.html#abonnement">Bli abonnent <span class="btn-arrow">→</span></a>';
    } catch (e) {
      badge.className = "badge none"; text.textContent = "Kunne ikke hente status";
    }
  }

  function update(user) {
    if (!window.CQAuth.isConfigured()) { show("view-unconfigured"); return; }
    if (user) {
      show("view-user");
      $("user-email").textContent = user.email;
      renderSub(user.email);
    } else {
      show("view-guest");
    }
  }

  document.addEventListener("DOMContentLoaded", function () {
    $("login-btn").addEventListener("click", () => window.CQAuth.signIn());
    $("logout-btn").addEventListener("click", () => window.CQAuth.signOut());
    // Vent på at auth.js har avgjort status.
    window.CQAuth.onChange(update);
    // Førstegangs-tegning i tilfelle ingen endring trigges.
    setTimeout(() => update(window.CQAuth.getUser()), 400);
  });
</script>
</body>
</html>
