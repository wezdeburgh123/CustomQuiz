  to = "/.netlify/functions/cancel-subscription"
  status = 200

# VM/event-ligaer — opprett og bli med (Bearer-JWT + service_role)
[[redirects]]
  from = "/api/league-create"
  to = "/.netlify/functions/league-create"
  status = 200

[[redirects]]
  from = "/api/league-join"
  to = "/.netlify/functions/league-join"
  status = 200

[[redirects]]
  from = "/api/league-leave"
  to = "/.netlify/functions/league-leave"
  status = 200

# Quiz-e-post — manuell test (krever DAILY_EMAIL_ENABLED=true)
[[redirects]]
  from = "/api/daily-email"
  to = "/.netlify/functions/daily-email"
  status = 200

# Brevo-webhook — synker avmeldinger tilbake til profiles
[[redirects]]
  from = "/api/brevo-webhook"
  to = "/.netlify/functions/brevo-webhook"
  status = 200
