# Quiz-cover-generator (OpenAI → Supabase Storage). Token-beskyttet (COVER_TOKEN).
# Bakgrunnsfunksjon: ?slug=<slug> for ett bilde, ?all=1&limit=N for backfill-batch.
[[redirects]]
  from = "/api/quiz-cover"
  to = "/.netlify/functions/quiz-cover-background"
  status = 200
