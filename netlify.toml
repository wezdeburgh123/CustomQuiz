# CustomQuiz — Netlify-konfig
# Statisk side (ingen build) + serverless-funksjon for AI-generering.

[build]
  publish = "."
  functions = "netlify/functions"
  # Synk arkivet ved HVER deploy: leser den nypushede quiz-library/library.ndjson
  # og upserter til Supabase quiz_library (idempotent på slug). Netlify kjører
  # `npm install` automatisk først (package.json finnes), så @supabase/supabase-js
  # er tilgjengelig. `|| echo` gjør steget IKKE-BLOKKERENDE — en synk-feil skal
  # aldri velte selve site-deployen. Den planlagte 04:30-synken står igjen som
  # sikkerhetsnett. NB: SUPABASE_URL + SUPABASE_SERVICE_ROLE_KEY må være
  # tilgjengelige for "Builds" (ikke bare "Functions") i Netlify-env.
  command = "node scripts/sync-library.mjs || echo 'library-sync hoppet over (ikke-blokkerende)'"

# Funksjonene kjører på Node 18+ (global fetch tilgjengelig, ingen avhengigheter).
[functions]
  node_bundler = "esbuild"
  # quiz-arkivet (skrevet av det nattlige skiftet) må følge med i deployen så
  # library-sync kan lese det server-side.
  included_files = ["quiz-library/library.ndjson"]

# Arkiv-synk — leser quiz-library/library.ndjson og upserter til Supabase
# quiz_library. Kjører daglig kl. 04:30 UTC så det som er committet alltid er
# i DB-en. Kan også trigges manuelt: GET /api/library-sync.
[functions."library-sync"]
  schedule = "30 4 * * *"

# Planlagt funksjon — Vipps månedlig trekk (Fase C). Kjører daglig kl. 06:00 UTC
# og oppretter neste charge i forkant av forfall. Ingen /api-redirect: dette er
# en scheduled function, ikke et offentlig endepunkt.
[functions."vipps-charge"]
  schedule = "0 6 * * *"

# Daglig fellesquiz — genereres hver kveld kl. 20:00 UTC (~21-22 Oslo), lager
# morgendagens quiz (og seeder i dag ved første kjøring). Auto-publiseres.
[functions."daily-quiz-generate"]
  schedule = "0 20 * * *"

# Quiz-e-post (mal #4) til påmeldte — UKENTLIG, mandag kl. 06:00 UTC (~07-08 Oslo).
# Daglig opplevdes for mye; ukentlig nudge i stedet. Endre til "0 6 * * *" for daglig.
# AVSKRUDD med mindre DAILY_EMAIL_ENABLED=true (sikkerhet mot utilsiktet blast).
[functions."daily-email"]
  schedule = "0 6 * * 1"

# Pene URL-er: /api/* -> funksjoner
[[redirects]]
  from = "/api/generate-quiz"
  to = "/.netlify/functions/generate-quiz"
  status = 200

# Quiz-arkiv (Supabase quiz_library)
[[redirects]]
  from = "/api/library-get"
  to = "/.netlify/functions/library-get"
  status = 200

[[redirects]]
  from = "/api/library-list"
  to = "/.netlify/functions/library-list"
  status = 200

[[redirects]]
  from = "/api/library-sync"
  to = "/.netlify/functions/library-sync"
  status = 200

# Moderering: brukerrapport + admin kill-switch (review_status på quiz_library)
[[redirects]]
  from = "/api/library-flag"
  to = "/.netlify/functions/library-flag"
  status = 200

# Plays-teller: bumper plays for en arkiv-quiz (datagrunnlag for forside-utvalg)
[[redirects]]
  from = "/api/library-play"
  to = "/.netlify/functions/library-play"
  status = 200

# Forsidas dynamiske utvalg (pinnet + roterende + fellesskap)
[[redirects]]
  from = "/api/featured"
  to = "/.netlify/functions/featured"
  status = 200

# Async quiz-generering (websøk): poll-endepunkt. Selve bakgrunnsfunksjonen
# kalles direkte på /.netlify/functions/quiz-generate-background (returnerer 202).
[[redirects]]
  from = "/api/quiz-status"
  to = "/.netlify/functions/quiz-status"
  status = 200

# Daglig fellesquiz: hent dagens quiz (offentlig). Generatoren kan også
# trigges manuelt på /api/daily-quiz-generate (for seeding/test).
[[redirects]]
  from = "/api/daily-quiz"
  to = "/.netlify/functions/daily-quiz"
  status = 200

[[redirects]]
  from = "/api/daily-quiz-generate"
  to = "/.netlify/functions/daily-quiz-generate"
  status = 200

# Betaling — Stripe (kort + Apple Pay)
[[redirects]]
  from = "/api/create-checkout"
  to = "/.netlify/functions/create-checkout"
  status = 200

[[redirects]]
  from = "/api/stripe-webhook"
  to = "/.netlify/functions/stripe-webhook"
  status = 200

# Betaling — Vipps Recurring
[[redirects]]
  from = "/api/vipps-agreement"
  to = "/.netlify/functions/vipps-agreement"
  status = 200

[[redirects]]
  from = "/api/vipps-callback"
  to = "/.netlify/functions/vipps-callback"
  status = 200

# Abonnementsstatus (innholdslåsing)
[[redirects]]
  from = "/api/subscription-status"
  to = "/.netlify/functions/subscription-status"
  status = 200

# Si opp abonnement (Stripe Customer Portal / Vipps stopp-avtale)
[[redirects]]
