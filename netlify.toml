# CustomQuiz — Netlify-konfig
# Statisk side (ingen build) + serverless-funksjon for AI-generering.

[build]
  publish = "."
  functions = "netlify/functions"
  # Synk arkivet ved HVER deploy: leser den nypushede quiz-library/library.ndjson
  # og upserter til Supabase quiz_library (idempotent på slug). Netlify kjører
  # `npm install` automatisk først (package.json finnes), så @supabase/supabase-js
  # er tilgjengelig. `|| echo` gjør steget IKKE-BLOKKERENDE — en synk-feil skal
  # aldri velte selve site-deployen. Den planlagte 04:30-synken står igjen som
  # sikkerhetsnett. NB: SUPABASE_URL + SUPABASE_SERVICE_ROLE_KEY må være
  # tilgjengelige for "Builds" (ikke bare "Functions") i Netlify-env.
  # Etter synk: generer statiske, crawlbare /quiz/<slug>-sider + sitemap.xml fra
  # quiz_library (SEO). Steget er ikke-blokkerende (`|| echo`) — en SEO-glipp skal
  # aldri velte selve site-deployen. build-quiz-pages leser primært Supabase og
  # faller tilbake til library.ndjson uten DB.
  command = "node scripts/sync-library.mjs || echo 'library-sync hoppet over (ikke-blokkerende)'; node scripts/build-quiz-pages.mjs || echo 'build-quiz-pages hoppet over (ikke-blokkerende)'"

# Funksjonene kjører på Node 18+ (global fetch tilgjengelig, ingen avhengigheter).
[functions]
  node_bundler = "esbuild"
  # quiz-arkivet (skrevet av det nattlige skiftet) må følge med i deployen så
  # library-sync kan lese det server-side.
  included_files = ["quiz-library/library.ndjson"]

# Arkiv-synk — leser quiz-library/library.ndjson og upserter til Supabase
# quiz_library. Kjører daglig kl. 04:30 UTC så det som er committet alltid er
# i DB-en. Kan også trigges manuelt: GET /api/library-sync.
[functions."library-sync"]
  schedule = "30 4 * * *"

# Planlagt funksjon — Vipps månedlig trekk (Fase C). Kjører daglig kl. 06:00 UTC
# og oppretter neste charge i forkant av forfall. Ingen /api-redirect: dette er
# en scheduled function, ikke et offentlig endepunkt.
[functions."vipps-charge"]
  schedule = "0 6 * * *"

# Daglig fellesquiz — genereres hver kveld kl. 20:00 UTC (~21-22 Oslo), lager
# morgendagens quiz (og seeder i dag ved første kjøring). Auto-publiseres.
[functions."daily-quiz-generate"]
  schedule = "0 20 * * *"

# Quiz-e-post (mal #4) til påmeldte — DAGLIG kl. 06:00 UTC (~07-08 Oslo).
# Satt til daglig 8. juni 2026 (Christian). Trekk ned frekvensen senere ved behov
# (ukentlig = "0 6 * * 1"). AVSKRUDD med mindre DAILY_EMAIL_ENABLED=true.
[functions."daily-email"]
  schedule = "0 6 * * *"

# Riktig MIME for web app manifest (ellers kan nettleseren ignorere det).
[[headers]]
  for = "/*.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"

# Pene arkiv-URL-er: /arkiv og /arkiv/<kategori>/<lag>... serveres av arkiv.html.
# status=200 = rewrite (adressen i nettleseren beholdes). arkiv.html leser selv
# Gammelt generator-filnavn -> nytt. Siden ble døpt om quiz-app-v2.html ->
# lag-quiz.html (18. juni 2026). 301 (permanent) så Google flytter ranking,
# og bokmerker/delelenker/?lib/?quiz/?utfordring-strenger følger med (Netlify
# bevarer query-strengen automatisk på redirects).
# Gammel generator-URL UTEN .html — Google indekserte /quiz-app-v2?lib=… og
# /quiz-app-v2?quiz=… Denne extension-løse varianten hadde ingen redirect og ga
# 404 (78 sider i GSC, juli 2026). Rekkefølge betyr noe: den spesifikke
# ?lib-regelen må stå FØR catch-all-en.
# 0) DØDE gamle slugs (quizen finnes ikke lenger som /quiz/<slug>/). Uten disse
# ville regel 1 sendt dem til en /quiz/-side som selv gir 404. Sendes i stedet til
# nærmeste relevante tema-hub (301). MÅ stå FØR den generiske ?lib-regelen.
[[redirects]]
  from = "/quiz-app-v2"
  to = "/tema/sport/"
  status = 301
  force = true
  [redirects.query]
    lib = "friidretts-rekorder__lett"

[[redirects]]
  from = "/quiz-app-v2"
  to = "/tema/musikk/"
  status = 301
  force = true
  [redirects.query]
    lib = "vassenggutane__medium"

[[redirects]]
  from = "/quiz-app-v2"
  to = "/tema/musikk/"
  status = 301
  force = true
  [redirects.query]
    lib = "vassendgutane__medium"

[[redirects]]
  from = "/quiz-app-v2"
  to = "/tema/musikk/"
  status = 301
  force = true
  [redirects.query]
    lib = "pop-bandet-zuma__medium"

[[redirects]]
  from = "/quiz-app-v2"
  to = "/tema/historie/"
  status = 301
  force = true
  [redirects.query]
    lib = "historien-til-norske-fyrtarn__medium"

[[redirects]]
  from = "/quiz-app-v2"
  to = "/tema/verdenshistorie/"
  status = 301
  force = true
  [redirects.query]
    lib = "verdenshistorie__medium"

[[redirects]]
  from = "/quiz-app-v2"
  to = "/tema/mix/"
  status = 301
  force = true
  [redirects.query]
    lib = "dinamo-vs-alle-andre-oslo-byraer-heder-og-aere-historie-fun-facts__medium"

# 1) ?lib=<slug> → den nye, indekserbare /quiz/<slug>/-siden (bevarer SEO-signal).
[[redirects]]
  from = "/quiz-app-v2"
  to = "/quiz/:slug/"
  status = 301
  force = true
  [redirects.query]
    lib = ":slug"

# 2) Alt annet på /quiz-app-v2 (?quiz=, ?event=, uten parametere) → generatoren.
[[redirects]]
  from = "/quiz-app-v2"
  to = "/lag-quiz"
  status = 301
  force = true

[[redirects]]
  from = "/quiz-app-v2.html"
  to = "/lag-quiz.html"
  status = 301
  force = true

# path-en og forhåndsfiltrerer. /arkiv.html fortsetter å virke som før.
[[redirects]]
  from = "/arkiv"
  to = "/arkiv.html"
  status = 200

[[redirects]]
  from = "/arkiv/*"
  to = "/arkiv.html"
  status = 200

# /tema-ROTEN hadde ingen index.html og ga 404 i GSC. De ekte /tema/<kategori>/-
# sidene er statiske mapper og serveres direkte — kun den bare roten sendes til
# arkivet (301). Ingen wildcard her, så /tema/geografi/ o.l. berøres ikke.
[[redirects]]
  from = "/tema"
  to = "/arkiv"
  status = 301
  force = true

[[redirects]]
  from = "/tema/"
  to = "/arkiv"
  status = 301
  force = true

# Fotball — egen verden (klubber/serier/landslag/VM). Pen URL /fotball serverer
# fotball.html (status=200 = rewrite, adressen beholdes). NB: /tema/<kategori>
# trenger INGEN regel — det er statiske mapper generert av build-quiz-pages.mjs
# (/tema/<kat>/index.html) som Netlify serverer direkte.
[[redirects]]
  from = "/fotball"
  to = "/fotball.html"
  status = 200

# Pene URL-er: /api/* -> funksjoner
[[redirects]]
  from = "/api/generate-quiz"
  to = "/.netlify/functions/generate-quiz"
  status = 200

# Quiz-arkiv (Supabase quiz_library)
[[redirects]]
  from = "/api/library-get"
  to = "/.netlify/functions/library-get"
  status = 200

[[redirects]]
  from = "/api/library-list"
  to = "/.netlify/functions/library-list"
  status = 200

[[redirects]]
  from = "/api/library-sync"
  to = "/.netlify/functions/library-sync"
